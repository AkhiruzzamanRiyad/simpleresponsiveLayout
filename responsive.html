<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive Website</title>
    <style>
        body {
            max-width: 1100px;
            border: 4px solid red;
            margin: 0 auto;
        }

        .img-container {
            display: flex;
            gap: 20px;
        }

        .img-container div {
            width: 50%;
        }

        .img-container img {
            width: 100%;

        }
        @media screen and (max-width:576px) {
            .img-container{
                flex-direction: column;
            }
            .img-container div{ 
                width: 100%;
            }
            
        }
    </style>
</head>

<body>
    <header>
        <ol>
            <h3>Responsive website</h3>
            <li>View Port meta tag</li>
            <li>Css Relative unit</li>
            <li>body max width and horizontal center aligb</li>
            <li>img fluid</li>
            <li>Two column flex and use media query with flex direction column</li>
            <li>Multi column: Use grid layout</li>
            <li>Menue Responsive: Will need java script</li>
        </ol>
    </header>
    <main>
        <div class="img-container">
            <div> <img src="images/gitter.jpg" alt="">
            </div>
            <div> <img src="images/gitter2.jpg" alt="">
            </div>
        </div>
    </main>

</body>

</html>
